# Bulk Si example using finite displacement.
structure:
  poscar: examples/POSCAR_bulk

calculator:
  name: nep
  nep_model: potentials/Si_Bulk_Fan.txt

relaxation:
  enabled: true

force-constant:
  dim-fc2: [3, 3, 3]
  dim-fc3: [3, 3, 3]
  use_hiphive: false

kappa:
  mesh: [21, 21, 21]
  temps: [100, 1000, 50]
  method: lbte
  isotope: false
  bfmp: 1.0e6
  wigner: false

output:
  progress: true
  result_dir: results/3-bulk-nep-lbte
