# Film Si example using HiPhive.
structure:
  poscar: examples/POSCAR_film
  dimensionality: 2
  effective_thickness: 10.0
  vacuum_axis: z

calculator:
  name: nep
  nep_model: potentials/Si_NWs_XuKe.txt

relaxation:
  enabled: false

force-constant:
  dim-fc2: [4, 4, 1]
  dim-fc3: [4, 4, 1]
  use_hiphive: true
  n_structures: 500
  rattle_std: 0.03
  min_dist: 2.2
  cutoffs: [5.0, 4.0]

kappa:
  mesh: [21, 21, 1]
  temps: [100, 1000, 50]
  method: rta
  isotope: false
  bfmp: 1.0e6
  wigner: false

output:
  progress: true
  result_dir: results/8-film-nep-hiphive-rta
