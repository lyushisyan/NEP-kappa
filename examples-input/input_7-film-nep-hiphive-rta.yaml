# Film Si example using HiPhive.
structure:
  poscar: examples-input/POSCAR_film

calculator:
  name: nep
  nep_model: potentials/Si_NWs_XuKe.txt

relaxation:
  enabled: false

force-constant:
  dim: [4, 4, 1]
  use_hiphive: true
  n_structures: 500
  rattle_std: 0.03
  min_dist: 2.2
  cutoffs: [5.0, 4.0]

kappa:
  mesh: [21, 21, 1]
  temps: [100, 1000, 50]
  method: rta
  wigner: false

output:
  progress: true
  result_dir: examples-output/7-film-nep-hiphive-rta
